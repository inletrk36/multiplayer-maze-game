<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinite Maze - Multiplayer Menu</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
}

#menu {
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.panel {
    background:#1a1a1a;
    padding:20px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

button {
    width:100%;
    padding:10px;
    margin-top:8px;
    cursor:pointer;
    font-size:16px;
}

input {
    width:100%;
    padding:8px;
    margin-top:6px;
}
</style>
</head>
<body>

<div id="menu">

    <h1>Infinite Maze</h1>

    <div class="panel">

        <button onclick="showCreate()">Create Server</button>
        <button onclick="showJoin()">Join Server</button>
        <button onclick="offline()">Offline Play</button>

    </div>

    <!-- CREATE SERVER -->
    <div class="panel" id="createPanel" style="display:none;">
        <h3>Create Server</h3>

        <label>Max Players</label>
        <input id="maxPlayers" type="number" min="1" max="16" value="4">

        <button onclick="createServer()">Start Server</button>
    </div>

    <!-- JOIN SERVER -->
    <div class="panel" id="joinPanel" style="display:none;">
        <h3>Join Server</h3>

        <label>Server Code / IP</label>
        <input id="serverCode" placeholder="e.g. abc123 or 192.168.0.5:3000">

        <button onclick="joinServer()">Join</button>
    </div>

</div>

<script>
const socket = io();

let remotePlayers = {};
let myId = null;

socket.on("connect", () => {
    myId = socket.id;
    console.log("Connected as:", myId);
});

socket.on("state", (players) => {
    remotePlayers = players;
});
// ---------------- UI ----------------
function showCreate(){
    document.getElementById("createPanel").style.display="block";
    document.getElementById("joinPanel").style.display="none";
}

function showJoin(){
    document.getElementById("joinPanel").style.display="block";
    document.getElementById("createPanel").style.display="none";
}

function offline(){
    alert("Offline mode selected (we'll connect game next step)");
    startGame("offline");
}

// ---------------- SERVER ACTIONS (PLACEHOLDERS) ----------------
function createServer(){
    let max = document.getElementById("maxPlayers").value;

    alert("Server created!\nMax players: " + max + "\n\n(Next step: real Node.js server)");
    
    startGame("host");
}

function joinServer(){
    let code = document.getElementById("serverCode").value;

    if(!code){
        alert("Enter a server code or IP");
        return;
    }

    alert("Joining server: " + code + "\n\n(Next step: connect via WebSocket)");

    startGame("client");
}

// ---------------- GAME START HOOK ----------------
function startGame(mode){
    console.log("Starting game mode:", mode);

    // This will later load your maze game
    // and connect networking depending on mode

    document.body.innerHTML = `
        <canvas id="game"></canvas>
        <div style="position:absolute;top:10px;left:10px;color:white;">
            Mode: ${mode}
        </div>
    `;
}
</script>

</body>
</html>
